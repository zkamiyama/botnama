<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Botnama Info Overlay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --band-height: 56px;
      --bg: linear-gradient(90deg, rgba(20, 31, 48, 0.86), rgba(12, 18, 32, 0.92));
      --text: #eaf3ff;
      --info: #3fbff0;
      --warn: #f6b93b;
      --error: #ff5e7b;
      --padding: 14px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Nunito", "Noto Sans JP", system-ui, -apple-system, "Segoe UI", sans-serif;
      background: transparent;
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }
    #band, #statusBand {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: var(--band-height);
      background: var(--bg);
      display: flex;
      align-items: center;
      padding: 0 var(--padding);
      overflow: hidden;
      border-bottom: 0;
      transform: translateX(100%);
      opacity: 0;
      transition: transform 260ms ease, opacity 260ms ease;
      pointer-events: none;
      will-change: transform, opacity;
    }
    #statusBand { top: var(--band-height); }
    #band.visible, #statusBand.visible { transform: translateX(0); opacity: 1; }
    #band.exit-left, #statusBand.exit-left { transform: translateX(-100%); opacity: 0; }
    #band[data-level="warn"] { background: linear-gradient(90deg, rgba(246,185,59,0.35), rgba(12,18,32,0.92)); }
    .poll-winner {
      color: #ffeb3b;
      font-weight: 800;
      text-shadow: 0 0 5px rgba(255, 235, 59, 0.6);
      font-size: 1.1em;
    }
    .poll-sep { margin: 0 8px; }
    #band[data-level="error"] { background: linear-gradient(90deg, rgba(255,94,123,0.45), rgba(12,18,32,0.92)); }
    #statusBand[data-level="warn"] { background: linear-gradient(90deg, rgba(246,185,59,0.22), rgba(12,18,32,0.9)); }
    #statusBand[data-level="error"] { background: linear-gradient(90deg, rgba(255,94,123,0.28), rgba(12,18,32,0.9)); }
    #marquee, #statusMarquee {
      display: inline-flex;
      align-items: center;
      gap: 16px;
      white-space: nowrap;
      will-change: transform;
    }
    #marquee.scroll, #statusMarquee.scroll {
      animation: marquee linear infinite;
    }
    #textClone, #statusTextClone { opacity: 0.7; }
    #label { display: inline-flex; align-items: center; gap: 8px; }
    #statusLabel { display: none; }
    #payload, #statusPayload {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.01em;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.55));
      margin: 0;
      line-height: 1.2;
    }
    #icon, #statusIcon {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      display: inline-block;
      background: var(--info);
      box-shadow: 0 0 12px var(--info);
    }
    #band[data-level="warn"] #icon { background: var(--warn); box-shadow: 0 0 12px var(--warn); }
    #band[data-level="error"] #icon { background: var(--error); box-shadow: 0 0 12px var(--error); }
    #statusBand[data-level="warn"] #statusIcon { background: var(--warn); box-shadow: 0 0 12px var(--warn); }
    #statusBand[data-level="error"] #statusIcon { background: var(--error); box-shadow: 0 0 12px var(--error); }
    @keyframes marquee {
      from { transform: translateX(0); }
      to { transform: translateX(calc(-1 * var(--scroll-distance, 50%))); }
    }
    /* OBS用に上書きしやすいようクラスと変数中心 */
  </style>
</head>
<body>
  <div id="band" data-level="info">
    <div id="marquee">
      <span id="label"><span id="icon"></span><span id="labelText">INFO</span></span>
      <span id="payload"></span>
      <span id="textClone"></span>
    </div>
  </div>
  <div id="statusBand" data-level="info">
    <div id="statusMarquee">
      <span id="statusLabel"><span id="statusIcon"></span><span id="statusLabelText">STATUS</span></span>
      <span id="statusPayload"></span>
      <span id="statusTextClone"></span>
    </div>
  </div>
  <script type="module" src="./overlay-info.js"></script>
</body>
</html>
