<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Request Dock</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="dock">
      <section class="summary" id="summary">
        <div class="summary-metrics" id="summaryMetrics"></div>
        <div class="control-buttons">
          <button id="stopButton" type="button" title="停止">
            <img src="/icons/stop.svg" alt="停止" />
          </button>
          <button id="skipButton" type="button" title="スキップ">
            <img src="/icons/skip_next.svg" alt="スキップ" />
          </button>
          <button id="refreshButton" type="button" title="更新">
            <img src="/icons/refresh.svg" alt="更新" />
          </button>
        </div>
      </section>
      <section class="playback-controls" id="playbackControls">
        <div class="playback-times">
          <span id="playbackCurrent">--:--</span>
          <input id="playbackSeek" type="range" min="0" max="1" value="0" step="0.01" disabled />
          <span id="playbackDuration">--:--</span>
        </div>
        <div class="playback-buttons">
          <button id="seekBackwardButton" type="button">-10秒</button>
          <button id="seekForwardButton" type="button">+10秒</button>
        </div>
      </section>
      <section class="queue">
        <div class="tabs" id="tabSwitcher">
          <button class="tab-button active" data-tab="list">再生リスト</button>
          <button class="tab-button" data-tab="debug">デバッグ</button>
          <button class="tab-button" data-tab="comments">コメント</button>
          <button class="tab-button" data-tab="system">システム</button>
        </div>
        <div class="tab-shell">
          <div class="tab-panel active" id="tabList">
            <div class="queue-controls">
              <div class="queue-counter" id="queueCounter"></div>
              <button id="clearButton" type="button" class="danger">全削除</button>
            </div>
            <div class="queue-list" id="queueList"></div>
          </div>
          <div class="tab-panel" id="tabDebug">
            <form id="commentForm" class="comment-form">
              <label for="commentInput">コメテスト</label>
              <textarea
                id="commentInput"
                rows="4"
                placeholder="コメントを入力（URLを含めるとリクエスト登録）"
              ></textarea>
              <label for="userNameInput">投稿者名（任意）</label>
              <input type="text" id="userNameInput" placeholder="匿名" autocomplete="off" />
              <button type="submit">送信</button>
            </form>
            <p id="formStatus" class="status-text"></p>
          </div>
          <div class="tab-panel" id="tabComments">
            <div class="comment-table">
              <div class="comment-table-header">
                <span>時刻</span>
                <span>投稿者</span>
                <span>本文</span>
              </div>
              <div class="comment-table-body" id="commentTableBody"></div>
            </div>
          </div>
          <div class="tab-panel" id="tabSystem">
            <div class="system-table">
              <div class="system-row">
                <span>yt-dlp (使用中)</span>
                <span id="ytDlpVersion">--</span>
                <button type="button" id="updateYtDlpButton">アップデート</button>
              </div>
              <div class="system-row">
                <span>yt-dlp 最新リリース</span>
                <span id="ytDlpLatest">--</span>
              </div>
              <div class="system-row">
                <span>yt-dlp-ejs</span>
                <span id="ytDlpEjsStatus">--</span>
                <button type="button" id="refreshYtDlpEjsButton">更新</button>
              </div>
              <div class="system-message" id="systemMessage"></div>
            </div>
          </div>
        </div>
        <div class="status-area" id="statusArea"></div>
      </section>
    </main>
    <script src="./dock.js" defer></script>
  </body>
</html>
